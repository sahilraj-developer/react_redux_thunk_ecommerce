name: Frontend CI

on:
  push:
    paths:
      - "ecommerce-redux/**"
  pull_request:
    paths:
      - "ecommerce-redux/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce-redux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ecommerce-redux/package-lock.json
      - run: npm ci
      - run: npm run build
